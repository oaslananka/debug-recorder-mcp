name: Documentation task
description: Report missing, stale, or confusing documentation.
title: '[DOCS] '
labels: ['type:docs', 'area:docs', 'priority:P2', 'risk:low']
assignees: ['oaslananka']
body:
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing open and closed issues first.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What documentation is missing, stale, or unclear?
    validations:
      required: true
  - type: textarea
    id: location
    attributes:
      label: Current location
      description: Link or name the current file, section, command, or behavior.
    validations:
      required: true
  - type: textarea
    id: required-change
    attributes:
      label: Required change
      description: Describe the update that would make this complete and accurate.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: List commands, links, or screenshots that should prove the docs are correct.
    validations:
      required: false
