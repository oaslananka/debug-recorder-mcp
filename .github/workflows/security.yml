name: Security Checks

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  schedule:
    - cron: '23 4 * * 2'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  workflow-lint:
    name: Workflow Lint and Security
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      # renovate: datasource=github-releases depName=rhysd/actionlint extractVersion=^v(?<version>.*)$
      ACTIONLINT_VERSION: 1.7.12
      # renovate: datasource=github-releases depName=zizmorcore/zizmor
      ZIZMOR_VERSION: 1.27.0
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install actionlint
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="${ACTIONLINT_VERSION}"
          asset="actionlint_${version}_linux_amd64.tar.gz"
          checksum="actionlint_${version}_checksums.txt"
          install_dir="$RUNNER_TEMP/actionlint"
          mkdir -p "$install_dir"
          gh release download "v${version}" \
            --repo rhysd/actionlint \
            --pattern "$asset" \
            --pattern "$checksum" \
            --dir "$install_dir"
          (
            cd "$install_dir"
            grep "  ${asset}$" "$checksum" | sha256sum --check --strict
            tar -xzf "$asset" actionlint
          )
          chmod +x "$install_dir/actionlint"
          echo "$install_dir" >> "$GITHUB_PATH"

      - name: actionlint
        run: actionlint -color

      - name: zizmor
        uses: zizmorcore/zizmor-action@6599ee8b7a49aef6a770f63d261d214911a7ce02 # v0.6.0
        with:
          inputs: .github/workflows
          persona: auditor
          min-severity: low
          version: ${{ env.ZIZMOR_VERSION }}
          advanced-security: false

  secret-scan:
    name: Gitleaks Secret Scan
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      # renovate: datasource=github-releases depName=gitleaks/gitleaks extractVersion=^v(?<version>.*)$
      GITLEAKS_VERSION: 8.30.1
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Gitleaks
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="${GITLEAKS_VERSION}"
          asset="gitleaks_${version}_linux_x64.tar.gz"
          checksum="gitleaks_${version}_checksums.txt"
          install_dir="$RUNNER_TEMP/gitleaks"
          mkdir -p "$install_dir"
          gh release download "v${version}" \
            --repo gitleaks/gitleaks \
            --pattern "$asset" \
            --pattern "$checksum" \
            --dir "$install_dir"
          (
            cd "$install_dir"
            grep "  ${asset}$" "$checksum" | sha256sum --check --strict
            tar -xzf "$asset" gitleaks
          )
          chmod +x "$install_dir/gitleaks"
          echo "$install_dir" >> "$GITHUB_PATH"

      - name: Scan current tree
        run: gitleaks dir . --redact --no-banner --verbose

  trivy-fs:
    name: Trivy Filesystem Scan
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: SBOM/VEX policy reference
        if: ${{ failure() }}
        run: echo "Trivy filesystem scan failed. Review docs/security-sbom-vex.md before fixing or recording a VEX decision."
