name: Docs

on:
  push:
    branches: [main]
    paths:
      - README.md
      - CHANGELOG.md
      - LICENSE
      - docs/**
      - src/**
      - scripts/build-docs-site.mjs
      - typedoc.json
      - package.json
      - package-lock.json
      - .github/workflows/docs.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Build and publish docs
    if: ${{ github.repository == 'oaslananka/debug-recorder-mcp' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: write # publish generated static site to the gh-pages branch
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: '24.16.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build documentation site
        run: npm run docs:site

      - name: Publish gh-pages branch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          rm -rf /tmp/debug-recorder-mcp-site
          cp -R site /tmp/debug-recorder-mcp-site
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git checkout --orphan gh-pages
          git rm -rf .
          cp -R /tmp/debug-recorder-mcp-site/. .
          git add -A
          git commit -m "docs: publish ${GITHUB_SHA}"
          gh auth setup-git
          git push origin gh-pages --force

      - name: Print published URL
        run: echo "Docs are published at https://oaslananka.github.io/debug-recorder-mcp/"
