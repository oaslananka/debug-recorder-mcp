name: Publish GHCR Image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build.
        type: string
        default: main
      push_image:
        description: Push image to GHCR. Default is build-only validation.
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: publish-ghcr-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write # required to push images to GitHub Container Registry
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Read package version
        id: pkg
        run: |
          set -euo pipefail
          version=$(node -p "require('./package.json').version")
          name=$(node -p "require('./package.json').name")
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "name=${name}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        if: ${{ github.event_name == 'release' || inputs.push_image == true }}
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.pkg.outputs.version }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            type=ref,event=tag

      - name: Build or push image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name == 'release' || inputs.push_image == true }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true

      - name: Summarize image
        run: |
          set -euo pipefail
          echo "Image: ghcr.io/${GITHUB_REPOSITORY}"
          echo "Package: ${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }}"
