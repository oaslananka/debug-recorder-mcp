name: Snyk

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  schedule:
    - cron: '13 5 * * 4'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: snyk-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  open-source:
    name: Snyk Open Source
    if: >-
      ${{ github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.16.0'
          cache: npm

      - name: Setup Snyk CLI
        id: snyk
        uses: snyk/actions/setup@9adf32b1121593767fc3c057af55b55db032dc04 # v1.0.0
        with:
          snyk-version: 1.1306.1

      - name: Verify pinned Snyk version
        shell: bash
        run: test "${{ steps.snyk.outputs.version }}" = '1.1306.1'

      - name: Scan npm dependencies
        shell: bash
        env:
          SNYK_TOKEN: ${{ secrets.SYNK_PAT_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${SNYK_TOKEN:-}" ]; then
            echo "::error::SYNK_PAT_TOKEN must contain a valid Snyk API token."
            exit 1
          fi
          snyk test \
            --file=package.json \
            --package-manager=npm \
            --dev \
            --severity-threshold=high \
            --strict-out-of-sync=true
